<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday 🎉</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Playfair+Display:wght@700&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(45deg, #ff0066, #ffcc00, #33ccff, #9900ff);
            background-size: 400% 400%;
            animation: gradient 8s ease infinite;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        
        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        
        .container {
            z-index: 10;
            padding: 20px;
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
            animation: glow 1.5s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from {
                text-shadow: 0 0 20px #fff;
            }
            to {
                text-shadow: 0 0 40px #fff, 0 0 60px #ff00ff;
            }
        }
        
        .name {
            font-size: 3rem;
            margin: 15px 0;
            color: #ffff00;
            text-shadow: 0 0 20px #ffff00;
        }
        
        p {
            font-size: 1.4rem;
            margin: 20px 0;
        }
        
        .cake {
            font-size: 6rem;
            margin: 30px 0;
            animation: cakeFloat 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px #fff);
        }
        
        @keyframes cakeFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-25px);
            }
        }
        
        .candles {
            font-size: 2.5rem;
            animation: flame 0.8s infinite alternate;
        }
        
        button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.3rem;
            background: #fff;
            color: #ff0066;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
        }
        
        button:hover {
            transform: scale(1.1);
            background: #ffff00;
        }
        /* Balloons */
        
        .balloons {
            position: absolute;
            font-size: 3rem;
            animation: balloonRise 12s linear infinite;
            opacity: 0.9;
        }
        
        @keyframes balloonRise {
            0% {
                transform: translateY(100vh) rotate(0deg);
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
            }
        }
        /* Confetti */
        
        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            animation: confettiFall 6s linear infinite;
        }
        
        @keyframes confettiFall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
            }
        }
        
        @media(max-width:768px) {
            h1 {
                font-size: 2.8rem;
            }
            .name {
                font-size: 2rem;
            }
            p {
                font-size: 1rem;
            }
            .cake {
                font-size: 4rem;
            }
            button {
                font-size: 1rem;
                padding: 12px 25px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🎉 HAPPY BIRTHDAY 🎉</h1>

        <div class="name" id="personName">
            Dear Friend
        </div>

        <p>
            Wishing you a fantastic year ahead filled with love, joy & success!
        </p>

        <div class="cake" id="cake">
            🎂
        </div>

        <div class="candles" id="candles">
            🕯️🕯️🕯️
        </div>

        <p>
            May all your dreams come true ✨
        </p>

        <button onclick="blowCandles()">
            Blow Candles 🎂
        </button>
    </div>

    <script>
        // Ask Name

        let name = prompt("Enter the Birthday Person's Name:", "Sai");

        if (name && name.trim() !== "") {
            document.getElementById("personName").textContent = name.toUpperCase();
        }

        // Create Balloon

        function createBalloon() {

            const balloon = document.createElement('div');

            balloon.className = 'balloons';

            balloon.textContent = ['🎈', '🎉', '🪅', '❤️', '✨'][Math.floor(Math.random() * 5)];

            balloon.style.left = Math.random() * 100 + 'vw';

            balloon.style.animationDuration =
                (Math.random() * 8 + 10) + 's';

            balloon.style.fontSize =
                (Math.random() * 2 + 2.5) + 'rem';

            document.body.appendChild(balloon);

            setTimeout(() => balloon.remove(), 20000);
        }

        // Create Confetti

        function createConfetti() {

            const colors = [
                '#ff0066',
                '#ffff00',
                '#00ffcc',
                '#ff00ff',
                '#33ccff'
            ];

            for (let i = 0; i < 80; i++) {

                const confetti = document.createElement('div');

                confetti.className = 'confetti';

                confetti.style.backgroundColor =
                    colors[Math.floor(Math.random() * colors.length)];

                confetti.style.left =
                    Math.random() * 100 + 'vw';

                confetti.style.animationDuration =
                    (Math.random() * 4 + 4) + 's';

                confetti.style.opacity =
                    Math.random() + 0.5;

                confetti.style.transform =
                    `rotate(${Math.random() * 360}deg)`;

                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 10000);
            }
        }

        // Blow Candles

        function blowCandles() {

            const candles = document.getElementById('candles');

            candles.style.transition = 'all 1s';

            candles.style.transform = 'scale(0.2)';

            candles.textContent = '💨✨';

            createConfetti();

            setTimeout(() => {

                alert("🎂 Candles blown! Make a wish! ✨");

                candles.style.transition = 'all 0.5s';

                candles.style.transform = 'scale(1)';

                candles.textContent = '🕯️🕯️🕯️';

            }, 1500);
        }

        // Auto Animations

        setInterval(createBalloon, 600);

        setInterval(() => {
            createConfetti();
        }, 3000);

        // Initial Load

        window.onload = () => {

            createConfetti();

            for (let i = 0; i < 12; i++) {
                setTimeout(createBalloon, i * 300);
            }
        };
    </script>

</body>

</html>
