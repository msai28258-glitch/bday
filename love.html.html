<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do You Love Me?</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9ed9, #c39cff);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        .hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }
        
        .heart {
            position: absolute;
            font-size: 25px;
            color: #ff4d94;
            animation: floatHeart 6s linear infinite;
            opacity: 0.8;
        }
        
        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg);
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
            }
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            width: 380px;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            position: relative;
            z-index: 10;
        }
        
        .cat {
            font-size: 80px;
            margin: 15px 0;
        }
        
        h1 {
            font-size: 28px;
            color: #c026d3;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        
        .buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
            position: relative;
            min-height: 60px;
        }
        
        button {
            padding: 14px 32px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        }
        
        .yes-btn {
            background: #ff4d94;
            color: white;
            z-index: 2;
        }
        
        .yes-btn:hover {
            transform: scale(1.1);
        }
        
        .no-btn {
            background: #a3e635;
            color: #1e2937;
            position: relative;
        }
        
        .message {
            margin-top: 20px;
            font-size: 18px;
            color: #c026d3;
            min-height: 50px;
        }
        
        .celebration {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(255, 105, 180, 0.95);
            z-index: 100;
            border-radius: 30px;
            flex-direction: column;
            color: white;
        }
    </style>
</head>

<body>

    <div class="hearts" id="hearts"></div>

    <div class="card">
        <div class="cat">🐱</div>
        <h1>Do You Love Me?</h1>

        <div class="message" id="message"></div>

        <div class="buttons">
            <button class="yes-btn" id="yesBtn">Yes! 💖</button>
            <button class="no-btn" id="noBtn">No👎</button>
        </div>
    </div>

    <div class="celebration" id="celebration">
        <h2>Yay! 💕 You said Yes!</h2>
        <p style="font-size: 60px;">🐱❤️🐱</p>
        <button onclick="resetCard()" style="margin-top: 30px; padding: 12px 30px; font-size: 18px; background: white; color: #c026d3; border-radius: 50px;">
            Play Again
        </button>
    </div>

    <script>
        // Floating hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.textContent = ['❤️', '💖', '💗', '💘', '💝'][Math.floor(Math.random() * 5)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 4 + 5) + 's';
            document.getElementById('hearts').appendChild(heart);
            setTimeout(() => heart.remove(), 8000);
        }

        setInterval(createHeart, 250);

        // Elements
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const message = document.getElementById('message');
        const celebration = document.getElementById('celebration');

        let noClicks = 0;

        // Make No button run away
        function moveNoButton() {
            const card = document.querySelector('.card');
            const maxX = card.offsetWidth - noBtn.offsetWidth - 40;
            const maxY = 120;

            const randomX = Math.random() * maxX - 50;
            const randomY = Math.random() * maxY - 30;

            noBtn.style.transition = 'all 0.4s ease';
            noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
        }

        // Yes Button
        yesBtn.addEventListener('click', () => {
            celebration.style.display = 'flex';
        });

        // No Button - moves when mouse approaches
        noBtn.addEventListener('mousemove', () => {
            moveNoButton();
        });

        noBtn.addEventListener('click', () => {
            noClicks++;
            moveNoButton();

            if (noClicks === 1) {
                message.textContent = "Hey! What happened? 😏";
            } else if (noClicks === 2) {
                message.textContent = "The No button is running away 😂";
            } else {
                message.textContent = "You can't escape! Say Yes 💘";
            }
        });

        function resetCard() {
            celebration.style.display = 'none';
            message.textContent = '';
            noClicks = 0;
            noBtn.style.transform = 'translate(0, 0)';
        }

        // Initial hearts
        for (let i = 0; i < 20; i++) {
            setTimeout(createHeart, i * 80);
        }
    </script>
</body>

</html>
